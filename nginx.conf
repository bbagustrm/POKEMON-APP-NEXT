# nginx.static.conf - untuk Dockerfile.static (static export mode)
# Nginx serve file HTML/CSS/JS langsung, TANPA Node server
# Mirip dengan approach gurumu (serve /dist langsung)

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Next.js static assets - cache panjang (hash-based filenames)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Gambar & assets public
    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA routing - fallback ke index.html jika file tidak ditemukan
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}